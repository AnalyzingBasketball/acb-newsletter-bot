name: Auto ACB Newsletter

on:
  schedule:
    - cron: '0 7 * * *' # Ejecución diaria a las 08:00 AM (hora España)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-process:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4 # 👈 ¡Actualizado a v4!

    - name: Setup Python
      uses: actions/setup-python@v5 # 👈 ¡Actualizado a v5!
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests pandas beautifulsoup4 google-generativeai markdown

    - name: Ejecutar Check Status
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        URL_SUSCRIPTORES: ${{ secrets.URL_SUSCRIPTORES }}
        MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
      # 👇 AQUÍ ESTÁ EL TRUCO: Forzamos la IA y el envío directamente
      run: |
        python ai_writer.py
        python email_sender.py
      
    - name: Guardar cambios en Data
      run: |
        git config --global user.name 'ACB Bot'
        git config --global user.email 'bot@noreply.github.com'
        
        # 1. AÑADIMOS TODOS LOS ARCHIVOS MODIFICADOS (El punto es clave)
        git add .
        
        # 2. GUARDAMOS EN LOCAL (Commit)
        git commit -m "Auto: Update Data & Status [skip ci]" || echo "Nada que commitear"
        
        # 3. SINCRONIZAMOS CON LA NUBE
        git pull --rebase origin main || git pull --rebase origin master
        
        # 4. SUBIMOS TODO
        git push    - name: Guardar cambios en Data
      run: |
