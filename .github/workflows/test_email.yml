name: TEST - Solo Email (maquetacion)

on:
  workflow_dispatch:

jobs:
  test-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repo (rama mejoras)
      uses: actions/checkout@v4
      with:
        ref: mejoras

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install pandas markdown

    - name: Enviar email de prueba
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        URL_SUSCRIPTORES: ""
      run: python email_sender.py
